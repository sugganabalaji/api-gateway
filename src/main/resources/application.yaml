spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: quiz-microservice
          uri: lb://QUIZ-MICROSERVICE
          predicates:
            - Path=/quiz/**

        - id: question-microservice
          uri: lb://QUESTION-MICROSERVICE
          predicates:
            - Path=/questions/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8765